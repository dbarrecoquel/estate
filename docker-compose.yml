services:

  # ─────────────────────────────────────────
  # MongoDB
  # ─────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: shop_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./server/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - shop_network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─────────────────────────────────────────
  # API Node.js — port 3000
  # ─────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ads_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      MONGODB_URI: mongodb://${MONGO_APP_USER}:${MONGO_APP_PASSWORD}@mongo:27017/${MONGO_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - shop_network

  # ─────────────────────────────────────────
  # Front Vue.js — port 80
  # ─────────────────────────────────────────
  front:
    build:
      context: ./frontoffice
      dockerfile: Dockerfile
    container_name: ads_front
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - shop_network

volumes:
  mongo_data:
    driver: local

networks:
  shop_network:
    driver: bridge
